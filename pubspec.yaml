name: unfilter
description: "On-device app intelligence: fingerprint apps, analyze usage, and inspect your phone's software stack."
publish_to: "none"
version: 1.1.3+12

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9
  flutter_riverpod: ^3.3.1
  equatable: ^2.0.8
  fl_chart: ^1.2.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  flutter_svg: ^2.2.4
  shared_preferences: ^2.5.5
  http: ^1.6.0
  url_launcher: ^6.3.2
  skeletonizer: ^2.1.3
  system_info2: ^4.1.0
  battery_plus: ^7.0.0
  device_info_plus: ^13.1.0
  package_info_plus: ^10.1.0
  pub_semver: ^2.2.0
  share_plus: ^13.1.0
  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/white-unfilter-bg-black.png" # Standard icon
  adaptive_icon_background: "#000000" # Pure white layer
  adaptive_icon_foreground: "assets/icons/white-unfilter-nobg.png" # Floating logo layer

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/icons/black-unfilter-nobg.png"
  color_dark: "#000000"
  image_dark: "assets/icons/white-unfilter-nobg.png"

  android_12:
    image: "assets/icons/black-unfilter-nobg.png"
    icon_background_color: "#FFFFFF"
    image_dark: "assets/icons/white-unfilter-nobg.png"
    icon_background_color_dark: "#000000"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
    - assets/vectors/

  fonts:
    - family: UncutSans
      fonts:
        - asset: assets/fonts/UncutSans-Variable.ttf
